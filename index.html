<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Atlas Horizon- Home</title>
    <link rel="icon" href="./Resources/Additional/Icons/AtlasLogo.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/confirm-dialog.js" defer></script>
    <!-- <base href="https://she-fairy.github.io/atlas-horizon/"> -->
</head>
<body>
    <nav>
        <div class="logo">
            <img src="./Resources/Additional/Icons/AtlasLogo.png" alt="Atlas Horizon Logo" class="logo-img">
            Atlas Horizon
        </div>
        <div class="nav-links">
            <a href="./index.html" class="active">Home</a>
            <a href="./mapmaker.html">Map Maker</a>
            <a href="./map-gallery.html">Map Gallery</a>
            <a href="./my-maps.html">My Maps</a>
            <button id="loginBtn" class="login-btn">Login with Discord</button>
            <input class="avatar" type="image" id="avatar" alt="Avatar" style="display: none;">
        </div>
    </nav>

    <main class="home-container">
        <div class="hero-section">
            <img src="./Resources/Additional/Icons/AtlasLogo.png" alt="Atlas Horizon Logo" class="hero-logo">
            <h1>Welcome to Atlas Horizon Mapmaker</h1>
            <p>Create, share, and discover amazing Brawl Stars maps!</p>
            <div class="cta-buttons">
                <a href="./mapmaker.html" class="cta-button">Start Creating</a>
                <a href="./map-gallery.html" class="cta-button secondary">Browse Maps</a>
            </div>
        </div>
    </main>

    <div class="tooltip-floating">
        ?
        <div class="tooltip-text">
            This site is not affiliated with or endorsed by Supercell. Brawl Stars and all related assets belong to Supercell.
        </div>
    </div>

    <script>
        // Check if user is logged in (use Supabase session rather than localStorage)
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const user = (window.authInit && authInit.getCurrentUser) ? await authInit.getCurrentUser() : (window.supabaseService ? await supabaseService.getCurrentUser() : null);
                if (user) {
                    document.getElementById('loginBtn').style.display = 'none';
                    const avatar = document.getElementById('avatar');
                    if (avatar) { avatar.style.display = 'block'; avatar.src = user.user_metadata?.avatar_url || localStorage.getItem('avatar') || ''; }
                } else {
                    document.getElementById('loginBtn').style.display = 'block';
                    const avatar = document.getElementById('avatar'); if (avatar) avatar.style.display = 'none';
                }
            } catch (e) {
                console.warn('Auth check failed', e);
            }
        });

        // Handle avatar click for logout
        document.getElementById('avatar').addEventListener('click', async () => {
            if (await window.atlasConfirm({
                title: 'Log out?',
                message: 'Do you want to log out of this account?',
                confirmLabel: 'Log out'
            })){
                try { if (window.authInit && authInit.signOut) await authInit.signOut(); else if (window.supabaseService && supabaseService.signOut) await supabaseService.signOut(); } catch(e){ console.warn('signOut failed', e); }
                // Do not clear application configuration from storage; signOut handler clears only profile fields
                window.location.href = './index.html';
            }
        });
        </script>

    <!-- Supabase config + client + centralized auth initializer -->
    <script src="./js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
    <script src="./js/supabase-service.js"></script>
    <script src="./js/auth-init.js"></script>
    <script>
        const loginBtn = document.getElementById('loginBtn');
        if (loginBtn) loginBtn.addEventListener('click', async () => { try { await authInit.signIn(); } catch (e) { console.error('signIn failed', e); } });
    </script>
</body>
</html>
