<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Horizon - Map View</title>
    <link rel="icon" href="./Resources/Additional/Icons/AtlasLogo.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/map.css">
    <script src="./js/confirm-dialog.js" defer></script>
    <base href="https://she-fairy.github.io/atlas-horizon/">
</head>
<body>
    <nav>
        <div class="logo">
            <img src="./Resources/Additional/Icons/AtlasLogo.png" alt="Atlas Horizon Logo" class="logo-img">
            Atlas Horizon
        </div>
        <div class="nav-links">
            <a href="./index.html">Home</a>
            <a href="./mapmaker.html">Map Maker</a>
            <a href="./map-gallery.html">Map Gallery</a>
            <a href="./my-maps.html">My Maps</a>
            <button id="loginBtn" class="login-btn">Login with Discord</button>
            <input class="avatar" type="image" id="avatar" alt="Avatar" style="display: none;">
        </div>
    </nav>

    <main class="map-view-container">
        <div class="map-details">
            <h1 id="mapTitle">Map Title</h1>
            <p id="mapInfo">Created by: <span id="mapAuthor">Author</span></p>
            <div id="mapDetails">
                <p>Gamemode: <span id="mapGamemode">Gem Grab</span></p>
                <p>Environment: <span id="mapEnvironment">Desert</span></p>
            </div>
        </div>
        <div class="map-display">
            <img id="mapImage" />
        </div>
        <div class="map-actions">
            <a href="#" id="downloadMapBtn" class="action-button">Download Image</a>
            <button id="openMapBtn" class="action-button">Open in Map Maker</button>
            <button id="renameMapBtn" class="action-button">Rename</button>
            <button id="duplicateMapBtn" class="action-button">Duplicate</button>
            <button id="deleteMapBtn" class="action-button danger" style="display:none">Delete Map</button>
        </div>
    </main>

    <div class="tooltip-floating">
        ?
        <div class="tooltip-text">
            This site is not affiliated with or endorsed by Supercell. Brawl Stars and all related assets belong to Supercell.
        </div>
    </div>

    <!-- Supabase config + client + centralized auth initializer -->
    <script src="./js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
    <script src="./js/supabase-service.js"></script>
    <script src="./js/auth-init.js"></script>
    <script type="module" src="./js/map.js"></script>
    <script>
        const loginBtn = document.getElementById('loginBtn');
        if (loginBtn) loginBtn.addEventListener('click', async () => { try { await authInit.signIn(); } catch (e) { console.error('signIn failed', e); } });

        const avatar = document.getElementById('avatar');
        if (avatar) avatar.addEventListener('click', async () => {
            if (await window.atlasConfirm({
                title: 'Log out?',
                message: 'Do you want to log out of this account?',
                confirmLabel: 'Log out'
            })){
                try { if (window.authInit && authInit.signOut) await authInit.signOut(); } catch(e){ console.warn('signOut failed', e); }
            }
        });
    </script>
</body>
</html>
